name: CI

on:
  pull_request:
  # Pushes to main/master run the same checks inside `deploy.yml`; keeping
  # this workflow PR-scoped avoids two parallel CI runs per merge commit.
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Keep planning/RECORD-TYPES.md in lock-step with src/records/*.ts.
      # Run `npm run docs:records` locally and commit the diff.
      - name: Generated record docs are fresh
        run: npm run docs:records:check

      - name: Typecheck
        run: npm run typecheck

      - name: Vault unit tests
        run: npm run test:vault

      - name: Build
        run: npm run build
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
